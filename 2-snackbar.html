<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snackbar</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <script type="module" crossorigin src="/goit-js-hw-10/2-snackbar.js"></script>
    <link rel="modulepreload" crossorigin href="/goit-js-hw-10/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="/goit-js-hw-10/assets/vendor-BbbuE1sJ.js">
    <link rel="stylesheet" crossorigin href="/goit-js-hw-10/assets/vendor-CZjNVMTf.css">
    <link rel="stylesheet" crossorigin href="/goit-js-hw-10/assets/styles-KyJQwB9B.css">
  </head>
  <body>
    <main>
      <section class="section">
        <div class="container">
          <a class="back-link" href="./index.html">Go back</a>

          <h1 class="main-title">Snackbar</h1>

          <form class="form">
            <label class="form-delay">
              Delay (ms)
              <input
                class="form-delay-input"
                type="number"
                name="delay"
                required />
            </label>

            <fieldset class="form-fieldset">
              <legend>State</legend>
              <label class="form-label">
                <input type="radio" name="state" value="fulfilled" required />
                Fulfilled
              </label>
              <label class="form-label">
                <input type="radio" name="state" value="rejected" required />
                Rejected
              </label>
            </fieldset>

            <button class="form-submit-button" type="submit">
              Create notification
            </button>
          </form>
        </div>
      </section>
    </main>

  </body>
</html>
