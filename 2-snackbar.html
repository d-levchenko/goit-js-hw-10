<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snackbar</title>
    <link rel="stylesheet" crossorigin href="/goit-js-hw-10/assets/styles-030EaXlQ.css">
  </head>
  <body>
    <main>
      <section class="section">
        <div class="container">
          <a class="back-link" href="./index.html">Go back</a>

          <h1 class="main-title">Snackbar</h1>

          <form class="form">
            <label class="form-delay">
              Delay (ms)
              <input
                class="form-delay-input"
                type="number"
                name="delay"
                required />
            </label>

            <fieldset class="form-fieldset">
              <legend>State</legend>
              <label>
                <input type="radio" name="state" value="fulfilled" required />
                Fulfilled
              </label>
              <label>
                <input type="radio" name="state" value="rejected" required />
                Rejected
              </label>
            </fieldset>

            <button class="form-submit-button" type="submit">
              Create notification
            </button>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
